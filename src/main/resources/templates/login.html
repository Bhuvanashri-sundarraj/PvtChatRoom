<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login — ChatSpace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #0d0d0d;
            --bg-card:    #111111;
            --bg-el:      #1c1c1c;
            --bg-hover:   #222222;
            --border:     #272727;
            --border-hi:  #333333;
            --text-1:     #f2f2f2;
            --text-2:     #888888;
            --text-3:     #444444;
            --green:      #22c55e;
            --font:       'Inter', sans-serif;
            --spring:     cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease:       cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-1);
            overflow: hidden;
        }

        /* ── Ambient background ── */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-glow::before {
            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.028) 0%, transparent 65%);
            top: -200px;
            left: -200px;
        }
        .bg-glow::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(34,197,94,0.06) 0%, transparent 65%);
            bottom: -100px;
            right: -80px;
        }

        /* Grid texture */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        /* ── Layout ── */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── Card ── */
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 32px 80px rgba(0,0,0,0.6),
                0 8px 24px rgba(0,0,0,0.3);
            animation: cardIn 0.6s var(--spring) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Logo ── */
        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 36px;
            animation: fadeUp 0.5s var(--ease) 0.1s both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: var(--text-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 32px rgba(255,255,255,0.1);
            position: relative;
        }
        .logo-icon::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 19px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
            pointer-events: none;
        }

        .logo-status {
            position: absolute;
            bottom: -3px;
            right: -3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--green);
            border: 2px solid var(--bg-card);
            box-shadow: 0 0 8px rgba(34,197,94,0.6);
            animation: breathe 2.5s ease-in-out infinite;
        }
        @keyframes breathe {
            0%,100% { box-shadow: 0 0 8px rgba(34,197,94,0.6); }
            50%      { box-shadow: 0 0 3px rgba(34,197,94,0.2); }
        }

        .logo-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-1);
            letter-spacing: -0.03em;
            text-align: center;
        }

        .logo-subtitle {
            font-size: 13.5px;
            color: var(--text-2);
            text-align: center;
            margin-top: 6px;
            line-height: 1.5;
            font-weight: 400;
        }

        /* ── Divider ── */
        .divider {
            width: 100%;
            height: 1px;
            background: var(--border);
            margin: 28px 0;
            animation: fadeUp 0.5s var(--ease) 0.2s both;
        }

        /* ── Google Button ── */
        .google-btn-wrap {
            width: 100%;
            animation: fadeUp 0.5s var(--ease) 0.25s both;
        }

        .google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--bg-el);
            border: 1px solid var(--border-hi);
            border-radius: 12px;
            padding: 13px 20px;
            color: var(--text-1);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition:
                background 0.18s var(--ease),
                border-color 0.18s var(--ease),
                transform 0.18s var(--spring),
                box-shadow 0.18s var(--ease);
            position: relative;
            overflow: hidden;
        }
        .google-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent 50%);
            opacity: 0;
            transition: opacity 0.18s;
        }
        .google-btn:hover {
            background: var(--bg-hover);
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.4);
        }
        .google-btn:hover::before { opacity: 1; }
        .google-btn:active {
            transform: translateY(0px) scale(0.98);
            box-shadow: none;
        }

        /* Google G SVG */
        .google-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .btn-arrow {
            margin-left: auto;
            color: var(--text-3);
            font-size: 15px;
            transition: transform 0.18s var(--spring), color 0.18s;
        }
        .google-btn:hover .btn-arrow {
            transform: translateX(3px);
            color: var(--text-2);
        }

        /* ── Footer note ── */
        .footer-note {
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-3);
            text-align: center;
            line-height: 1.6;
            animation: fadeUp 0.5s var(--ease) 0.35s both;
        }
        .footer-note a {
            color: var(--text-2);
            text-decoration: none;
            border-bottom: 1px solid var(--border-hi);
            transition: color 0.15s, border-color 0.15s;
        }
        .footer-note a:hover { color: var(--text-1); border-color: var(--text-2); }

        /* ── Bottom brand ── */
        .bottom-brand {
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-3);
            letter-spacing: 0.04em;
            animation: fadeUp 0.5s var(--ease) 0.4s both;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .bottom-brand span { color: var(--text-3); }

        /* ── Feature chips ── */
        .chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 0;
            animation: fadeUp 0.5s var(--ease) 0.15s both;
        }
        .chip {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-2);
            background: var(--bg-el);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 4px 11px;
            display: flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.01em;
        }
        .chip-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--green);
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="page">
    <div class="card">

        <!-- Logo -->
        <div class="logo-wrap">
            <div class="logo-icon">
                💬
                <div class="logo-status"></div>
            </div>
            <div>
                <div class="logo-title">ChatSpace</div>
                <div class="logo-subtitle">Your private team chat.<br>Secure, fast, and beautifully simple.</div>
            </div>
        </div>

        <!-- Feature chips -->
        <div class="chips">
            <div class="chip"><div class="chip-dot"></div> Real-time</div>
            <div class="chip"><div class="chip-dot"></div> Private rooms</div>
            <div class="chip"><div class="chip-dot"></div> Encrypted</div>
        </div>

        <div class="divider"></div>

        <!-- Google Sign In -->
        <div class="google-btn-wrap">
            <a href="/oauth2/authorization/google" class="google-btn">
                <!-- Official Google G icon -->
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
                <span class="btn-arrow">→</span>
            </a>
        </div>

        <!-- Footer note -->
        <div class="footer-note">
            By continuing, you agree to our
            <a href="#">Terms of Service</a> and
            <a href="#">Privacy Policy</a>.
        </div>

    </div>

    <!-- Bottom brand -->
    <div class="bottom-brand">
        <span>ChatSpace</span>
        <span>·</span>
        <span>v1.0</span>
    </div>
</div>

</body>
</html>
